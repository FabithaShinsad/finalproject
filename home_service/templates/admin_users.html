{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h3>👥 All Users</h3>

    <table class="table table-bordered mt-3">
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Type</th>
            <th>Date Joined</th>
            <th>Action</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.user_type }}</td>
            <td>{{ u.date_joined }}</td>
            <td>
                <a href="{% url 'delete_user' u.id %}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

{% endblock %}
