{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                <!-- Header -->
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-1">➕ Add New Service</h3>
                    <small>Fill in the details to list your service</small>
                </div>

                <div class="card-body p-4">

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Service Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Service Name</label>
                            <input type="text" name="name" class="form-control form-control-lg" 
                                   placeholder="Enter service name" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" rows="4" class="form-control" 
                                      placeholder="Describe your service (optional)"></textarea>
                        </div>

                        <!-- Image Upload -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Service Image</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                            <small class="text-muted">Upload a clear image for better visibility</small>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-3">
                                ➕ Add Service
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<style>
body {
    background: #f4f6f9;
}

.card {
    transition: 0.3s ease-in-out;
}

.card:hover {
    transform: translateY(-4px);
}

.form-control:focus {
    box-shadow: none;
    border-color: #0d6efd;
}

label {
    margin-bottom: 6px;
}
</style>

{% endblock %}
