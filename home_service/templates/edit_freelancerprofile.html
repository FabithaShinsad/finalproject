{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h4>Edit Profile</h4>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success w-100">Save</button>

            </form>

        </div>
    </div>
</div>

{% endblock %}
